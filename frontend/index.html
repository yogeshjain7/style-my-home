<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Style My Home - AR Furniture</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <script type="module" src="https://unpkg.com/@google/model-viewer@3.4.0/dist/model-viewer.min.js"></script>
</head>
<body>
  <header>
    <h1>Style My Home</h1>
    <nav>
      <button id="login-nav-btn" class="nav-button">Login / Sign Up</button>
      <button id="logout-btn" class="nav-button" style="display: none;">Logout</button>
    </nav>
  </header>

  <section class="products">
    <h2>Our Collection</h2>
    
    <div class="filter-controls">
      <input type="search" id="search-bar" placeholder="Search furniture...">
      <div class="category-filters">
        <button class="filter-btn active" data-category="all">All</button>
        <button class="filter-btn" data-category="chair">Chairs</button>
        <button class="filter-btn" data-category="table">Tables</button>
        <button class="filter-btn" data-category="sofa">Sofas</button>
        <button class="filter-btn" data-category="storage">Storage</button>
      </div>
    </div>

    <div class="product-grid" id="product-grid"></div>
  </section>

  <div id="auth-modal" class="modal-overlay" style="display: none;">
    <div class="modal-content">
      <button id="auth-modal-close-btn" class="modal-close">&times;</button>
      
      <form id="signup-form">
        <h2>Create Account</h2>
        <input type="text" id="signup-email" class="form-input" placeholder="Email" required>
        <input type="password" id="signup-password" class="form-input" placeholder="Password" required>
        
        <p id="signup-error" class="error-msg"></p>
        
        <button type="submit" class="btn">Sign Up</button>
        <p class="form-switch">Already have an account? <a href="#" id="show-login">Log In</a></p>
      </form>

      <form id="login-form" style="display:none;">
        <h2>Welcome Back</h2>
        <input type="text" id="login-email" class="form-input" placeholder="Email" required>
        <input type="password" id="login-password" class="form-input" placeholder="Password" required>
        
        <p id="login-error" class="error-msg"></p>
        
        <button type="submit" class="btn">Log In</button>
        <p class="form-switch">Don't have an account? <a href="#" id="show-signup">Sign Up</a></p>
      </form>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
